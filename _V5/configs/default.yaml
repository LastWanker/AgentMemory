data:
  root_dir: data/V5
  shared_data_dir: data

slots:
  enabled: true
  fields:
    - raw_brief
    - event
    - intent
    - entities
    - status
    - emotion
    - context
    - impact

retrieval:
  mode: coarse_only
  dense_top_n: 50
  bm25_top_n: 50
  expanded_top_n_cap: 150
  cluster_expand_ratio: 0.5
  cluster_expand_min_hits: 2

encoder:
  model_name: intfloat/multilingual-e5-small
  use_e5_prefix: true
  local_files_only: true
  offline: true
  device: auto
  batch_size: 96
  batch_size_cuda: 128
  batch_size_cpu: 32

cache:
  dir: data/V5/VectorCacheV5
  alias: users

training:
  device: auto
  split_seed: 11
  train_ratio: 0.8
  valid_ratio: 0.1
  min_neg_per_source: 4
  max_neg_per_source: 24
  neg_ratio_near_miss: 0.5
  neg_ratio_random: 0.5
  epochs: 8
  batch_size: 8
  batch_size_cpu: 8
  batch_size_cuda: 16
  learning_rate: 0.001

evaluation:
  top_k_metrics:
    - 1
    - 3
    - 5
    - 10

query:
  reuse_current_augmentation: true
  slots_path: data/V5/processed/query_slots.jsonl

serving:
  host: 127.0.0.1
  port: 8891
